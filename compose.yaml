services:
  postgres:
    image: postgres:18.4-bookworm
    platform: linux/amd64
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bigeye}
      POSTGRES_USER: ${POSTGRES_USER:-bigeye}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bigeye}
      PGDATA: /var/lib/postgresql/18/docker
    ports:
      - "127.0.0.1:${BIGEYE_POSTGRES_PORT:-5433}:5432"
    volumes:
      - ./workspace/postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12
